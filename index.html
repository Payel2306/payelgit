<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      background: #f5f5f5;
    }

    .left {
      width: 50%;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left h1 {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .left h2 {
      font-size: 22px;
      color: #555;
      margin-bottom: 20px;
    }

    .left p {
      font-size: 16px;
      line-height: 1.6;
    }

    .right {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #222;
    }

    .right img {
      width: 250px;
      height: 250px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid white;
    }
  </style>
</head>
<body>

  <div class="left">
    <h1>PAYEL DAS</h1>
    <h2>BENGAL INSTITUTE OF SCIENCE AND TECHNOLOGY</h2>
    <p>
      I am a BCA(H) student passionate about Web Development 
      and Digital Marketing.
      I love creating user-friendly websites and continuosly 
      improving my technical skills.
  
    </p>
  </div>

  <div class="right">
    <img src="payel.jpeg" alt="My Photo">
  </div>

</body>
</html>
